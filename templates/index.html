<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金価格アップロードツール</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <button type="button" id="btn-settings" class="btn-settings" title="マージン設定">⚙️</button>
        <h1>金価格アップロードツール</h1>

        <button id="btn-fetch" class="btn btn-fetch">ネットジャパンから価格を取得する</button>

        <p id="init-source-note" class="init-source-note hidden">初期値はフリマハイクラスの最新を取得しています。</p>

        <form id="price-form" class="price-form hidden">
            <div class="form-group">
                <label>取得日時</label>
                <div class="date-input-row">
                    <input type="text" id="date-year" class="date-input date-input-year" maxlength="4" inputmode="numeric"><span class="date-sep">年</span>
                    <input type="text" id="date-month" class="date-input date-input-md" maxlength="2" inputmode="numeric"><span class="date-sep">月</span>
                    <input type="text" id="date-day" class="date-input date-input-md" maxlength="2" inputmode="numeric"><span class="date-sep">日</span>
                </div>
            </div>

            <!-- 金スクラップ -->
            <div id="gold-scrap-section" class="scrap-section hidden">
                <h2 class="scrap-heading">金買取価格</h2>
                <div class="scrap-grid" id="gold-scrap-grid"></div>
            </div>

            <!-- Ptスクラップ -->
            <div id="pt-scrap-section" class="scrap-section hidden">
                <h2 class="scrap-heading">Ptスクラップ買取価格</h2>
                <div class="scrap-grid" id="pt-scrap-grid"></div>
            </div>

            <button type="button" id="btn-upload" class="btn btn-upload">WordPressにアップロード</button>
        </form>

        <div id="status" class="status hidden"></div>

        <div id="source-link-wrap" class="source-link-wrap hidden">
            取得元: <a id="source-link" href="#" target="_blank" rel="noopener">#</a>
        </div>

        <div id="gbp-section" class="gbp-section hidden">
            <h2>GBP投稿用テキスト</h2>
            <div id="gbp-text" class="gbp-text"></div>
            <button id="btn-gbp" class="btn btn-gbp">コピーしてGBPを開く</button>
        </div>
    </div>

    <!-- 設定モーダル -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-panel">
            <h2>マージン設定</h2>
            <p class="modal-hint">参考値から差し引く円数。すべて0以上の整数。</p>
            <div class="margin-grid">
                <label>K24<input type="number" id="m-K24" min="0" step="1"></label>
                <label>K22 <span class="margin-note">(自店K24基準)</span><input type="number" id="m-K22" min="0" step="1"></label>
                <label>K18 <span class="margin-note">(生値固定・設定無効)</span><input type="number" id="m-K18" min="0" step="1" disabled></label>
                <label>K14<input type="number" id="m-K14" min="0" step="1"></label>
                <label>Pt1000<input type="number" id="m-Pt1000" min="0" step="1"></label>
                <label>Pt900<input type="number" id="m-Pt900" min="0" step="1"></label>
                <label>Pt850<input type="number" id="m-Pt850" min="0" step="1"></label>
            </div>
            <div id="settings-status" class="status hidden"></div>
            <div class="modal-actions">
                <button type="button" id="btn-settings-cancel" class="btn btn-cancel">キャンセル</button>
                <button type="button" id="btn-settings-save" class="btn btn-save">保存</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "{{ url_for('main.index') }}".replace(/\/$/, '');

        const btnFetch = document.getElementById('btn-fetch');
        const btnUpload = document.getElementById('btn-upload');
        const priceForm = document.getElementById('price-form');
        const statusEl = document.getElementById('status');
        const dateYearEl = document.getElementById('date-year');
        const dateMonthEl = document.getElementById('date-month');
        const dateDayEl = document.getElementById('date-day');

        // 数字以外の入力を即座に弾く
        [dateYearEl, dateMonthEl, dateDayEl].forEach(el => {
            el.addEventListener('input', () => {
                el.value = el.value.replace(/\D/g, '');
            });
        });

        function setDateFields(dateStr) {
            const m = /^(\d{4})年(\d{2})月(\d{2})日$/.exec(dateStr || '');
            if (m) {
                dateYearEl.value = m[1];
                dateMonthEl.value = m[2];
                dateDayEl.value = m[3];
            } else {
                dateYearEl.value = '';
                dateMonthEl.value = '';
                dateDayEl.value = '';
            }
        }

        function getDateString() {
            const y = dateYearEl.value.trim();
            const mo = dateMonthEl.value.trim().padStart(2, '0');
            const d = dateDayEl.value.trim().padStart(2, '0');
            return `${y}年${mo}月${d}日`;
        }
        const gbpSection = document.getElementById('gbp-section');
        const gbpTextEl = document.getElementById('gbp-text');
        const btnGbp = document.getElementById('btn-gbp');
        const sourceLinkWrap = document.getElementById('source-link-wrap');
        const sourceLinkEl = document.getElementById('source-link');
        const initSourceNote = document.getElementById('init-source-note');

        const GOLD_SCRAP_KEYS = ['K24', 'K22', 'K18', 'K14'];
        const PT_SCRAP_KEYS = ['Pt1000', 'Pt900', 'Pt850'];
        const SCRAP_LABELS = {
            'K24': 'K24（インゴット）',
            'K22': 'K22',
            'K18': 'K18',
            'K14': 'K14',
            'Pt1000': 'Pt1000（インゴット）',
            'Pt900': 'Pt900',
            'Pt850': 'Pt850',
        };

        let gbpText = '';
        let gbpSearchUrl = '';

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            statusEl.classList.remove('hidden');
        }

        function hideStatus() {
            statusEl.classList.add('hidden');
        }

        function renderScrapGridWithRef(gridEl, sectionEl, adjusted, reference, allowedKeys) {
            gridEl.innerHTML = '';
            const visibleKeys = allowedKeys.filter(k => adjusted[k] !== undefined);
            if (visibleKeys.length === 0) {
                sectionEl.classList.add('hidden');
                return;
            }
            sectionEl.classList.remove('hidden');
            visibleKeys.forEach(key => {
                const refValue = reference[key] || '';
                const initValue = adjusted[key] || '';
                const row = document.createElement('div');
                row.className = 'scrap-row';
                row.innerHTML =
                    '<span class="scrap-label">' + SCRAP_LABELS[key] + '</span>' +
                    '<span class="scrap-ref">' + (refValue ? '参考: ' + refValue + '円' : '') + '</span>' +
                    '<span class="scrap-input-wrap">' +
                        '<input type="text" class="scrap-input" data-key="' + key + '" value="' + initValue + '" data-ref="' + refValue + '">' +
                        '<span class="unit">円</span>' +
                    '</span>';
                gridEl.appendChild(row);
            });
        }

        function collectScrapValues(gridEl) {
            const result = {};
            gridEl.querySelectorAll('.scrap-input').forEach(input => {
                const val = input.value.trim();
                if (val) result[input.dataset.key] = val;
            });
            return result;
        }

        function findEmptyPriceLabels() {
            const empty = [];
            document.querySelectorAll('#gold-scrap-grid .scrap-input, #pt-scrap-grid .scrap-input').forEach(input => {
                if (!input.value.trim()) {
                    empty.push(SCRAP_LABELS[input.dataset.key] || input.dataset.key);
                }
            });
            return empty;
        }

        function parsePriceNumber(s) {
            if (!s) return NaN;
            return parseFloat(String(s).replace(/,/g, ''));
        }

        function findAboveReferenceLabels() {
            const above = [];
            document.querySelectorAll('#gold-scrap-grid .scrap-input, #pt-scrap-grid .scrap-input').forEach(input => {
                const entered = parsePriceNumber(input.value);
                const ref = parsePriceNumber(input.dataset.ref);
                if (!isNaN(entered) && !isNaN(ref) && entered > ref) {
                    const label = SCRAP_LABELS[input.dataset.key] || input.dataset.key;
                    above.push(`${label}: ${input.value.trim()} > 参考 ${input.dataset.ref}`);
                }
            });
            return above;
        }

        async function runFetch() {
            btnFetch.disabled = true;
            btnFetch.textContent = '取得中...';
            hideStatus();
            initSourceNote.classList.add('hidden');  // ネットジャパン値で上書きするので初期値の注記は消す

            try {
                const res = await fetch(BASE_URL + '/fetch', { method: 'POST' });
                const data = await res.json();

                if (data.error) {
                    showStatus('エラー: ' + data.error, 'error');
                } else {
                    setDateFields(data.date);
                    priceForm.classList.remove('hidden');
                    btnSettings.classList.add('hidden');

                    if (data.source_url) {
                        sourceLinkEl.href = data.source_url;
                        sourceLinkEl.textContent = data.source_url;
                        sourceLinkWrap.classList.remove('hidden');
                    }

                    const reference = data.reference || {};
                    const adjusted = data.adjusted || {};

                    renderScrapGridWithRef(
                        document.getElementById('gold-scrap-grid'),
                        document.getElementById('gold-scrap-section'),
                        adjusted, reference, GOLD_SCRAP_KEYS
                    );
                    renderScrapGridWithRef(
                        document.getElementById('pt-scrap-grid'),
                        document.getElementById('pt-scrap-section'),
                        adjusted, reference, PT_SCRAP_KEYS
                    );
                }
            } catch (e) {
                showStatus('通信エラーが発生しました: ' + e.message, 'error');
            } finally {
                btnFetch.disabled = false;
                btnFetch.textContent = '価格を取得する';
            }
        }

        // 画面を開いた時は自社サイト（フリマハイクラス）の現在公開価格を入力欄の初期値として取得する
        async function runFetchPublished() {
            btnFetch.disabled = true;
            hideStatus();
            try {
                const res = await fetch(BASE_URL + '/fetch-published', { method: 'POST' });
                const data = await res.json();

                if (data.error) {
                    showStatus('現在の公開価格の取得に失敗しました: ' + data.error, 'error');
                } else {
                    setDateFields(data.date);
                    priceForm.classList.remove('hidden');
                    btnSettings.classList.add('hidden');
                    initSourceNote.classList.remove('hidden');  // 初期値はフリマハイクラスから

                    if (data.source_url) {
                        sourceLinkEl.href = data.source_url;
                        sourceLinkEl.textContent = data.source_url;
                        sourceLinkWrap.classList.remove('hidden');
                    }

                    const values = data.values || {};
                    // 参考列(ネットジャパン値)はまだ無いので空で描画する
                    renderScrapGridWithRef(
                        document.getElementById('gold-scrap-grid'),
                        document.getElementById('gold-scrap-section'),
                        values, {}, GOLD_SCRAP_KEYS
                    );
                    renderScrapGridWithRef(
                        document.getElementById('pt-scrap-grid'),
                        document.getElementById('pt-scrap-section'),
                        values, {}, PT_SCRAP_KEYS
                    );
                }
            } catch (e) {
                showStatus('通信エラーが発生しました: ' + e.message, 'error');
            } finally {
                btnFetch.disabled = false;
            }
        }

        // ボタンクリックでネットジャパンから新価格を取得（入力欄を上書き）
        btnFetch.addEventListener('click', runFetch);

        // 画面を開いた瞬間に自社サイトの現在公開価格を取得する
        runFetchPublished();

        btnUpload.addEventListener('click', async () => {
            const emptyLabels = findEmptyPriceLabels();
            if (emptyLabels.length > 0) {
                alert('以下の価格が未入力です。プレースホルダの値を確認して入力してください:\n\n・' + emptyLabels.join('\n・'));
                return;
            }

            const aboveLabels = findAboveReferenceLabels();
            if (aboveLabels.length > 0) {
                const ok = confirm('以下の価格がネットジャパン参考値より高いです。続行しますか？\n\n・' + aboveLabels.join('\n・'));
                if (!ok) return;
            }

            btnUpload.disabled = true;
            btnUpload.textContent = 'アップロード中...';
            statusEl.classList.add('hidden');
            gbpSection.classList.add('hidden');

            const payload = {
                date: getDateString(),
                post_to_wp: true,
                gold_scrap: collectScrapValues(document.getElementById('gold-scrap-grid')),
                pt_scrap: collectScrapValues(document.getElementById('pt-scrap-grid')),
            };

            try {
                const res = await fetch(BASE_URL + '/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (data.error) {
                    showStatus('エラー: ' + data.error, 'error');
                } else {
                    const messages = [];
                    if (data.wordpress) {
                        if (data.wordpress.success) {
                            messages.push('WordPress: ' + (data.wordpress.message || '投稿成功'));
                        } else {
                            messages.push('WordPress エラー: ' + (data.wordpress.error || '不明なエラー'));
                        }
                    }
                    const wpSuccess = data.wordpress && data.wordpress.success;
                    showStatus(messages.join('\n'), wpSuccess ? 'success' : 'error');

                    if (data.gbp_text) {
                        gbpText = data.gbp_text;
                        gbpSearchUrl = data.gbp_search_url || '';
                        gbpTextEl.textContent = gbpText;
                        gbpSection.classList.remove('hidden');
                    }
                }
            } catch (e) {
                showStatus('通信エラーが発生しました: ' + e.message, 'error');
            } finally {
                btnUpload.disabled = false;
                btnUpload.textContent = 'WordPressにアップロード';
            }
        });

        // 価格欄から離れた時に式を計算（例: "10000-120" → "9,880"）
        function evaluateExpression(value) {
            const trimmed = value.trim();
            if (!trimmed) return value;
            const cleaned = trimmed.replace(/[,\s]/g, '');
            // 数字と + - * / . ( ) のみ許容（JS識別子は通さない）
            if (!/^[\d+\-*/.()]+$/.test(cleaned)) return value;
            // 演算子が無いただの数字なら、カンマ区切りで整形
            if (!/[+\-*/]/.test(cleaned)) {
                const n = parseFloat(cleaned);
                if (isNaN(n) || !isFinite(n)) return value;
                return Math.round(n).toLocaleString('en-US');
            }
            try {
                const result = new Function('return ' + cleaned)();
                if (typeof result !== 'number' || !isFinite(result)) return value;
                return Math.round(result).toLocaleString('en-US');
            } catch (e) {
                return value;
            }
        }

        // 動的生成される .scrap-input にイベント委譲（focusoutはバブルする）
        priceForm.addEventListener('focusout', (e) => {
            if (!e.target.classList.contains('scrap-input')) return;
            const newValue = evaluateExpression(e.target.value);
            if (newValue !== e.target.value) {
                e.target.value = newValue;
            }
        });

        btnGbp.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(gbpText);
                btnGbp.textContent = 'コピーしました！';
                setTimeout(() => {
                    btnGbp.textContent = 'コピーしてGBPを開く';
                }, 2000);
            } catch (e) {
                btnGbp.textContent = 'コピー失敗...';
                setTimeout(() => {
                    btnGbp.textContent = 'コピーしてGBPを開く';
                }, 2000);
            }
            if (gbpSearchUrl) {
                window.open(gbpSearchUrl, '_blank');
            }
        });

        // ----- マージン設定モーダル -----
        const MARGIN_KEYS = ['K24', 'K22', 'K18', 'K14', 'Pt1000', 'Pt900', 'Pt850'];
        const btnSettings = document.getElementById('btn-settings');
        const settingsModal = document.getElementById('settings-modal');
        const settingsStatus = document.getElementById('settings-status');
        const btnSettingsSave = document.getElementById('btn-settings-save');
        const btnSettingsCancel = document.getElementById('btn-settings-cancel');

        function showSettingsStatus(msg, type) {
            settingsStatus.textContent = msg;
            settingsStatus.className = 'status ' + type;
            settingsStatus.classList.remove('hidden');
        }

        async function openSettings() {
            settingsStatus.classList.add('hidden');
            try {
                const res = await fetch(BASE_URL + '/settings');
                const data = await res.json();
                MARGIN_KEYS.forEach(k => {
                    document.getElementById('m-' + k).value = data[k] ?? '';
                });
                settingsModal.classList.remove('hidden');
            } catch (e) {
                alert('設定の読み込みに失敗しました: ' + e.message);
            }
        }

        function closeSettings() {
            settingsModal.classList.add('hidden');
        }

        btnSettings.addEventListener('click', openSettings);
        btnSettingsCancel.addEventListener('click', closeSettings);
        settingsModal.querySelector('.modal-backdrop').addEventListener('click', closeSettings);

        btnSettingsSave.addEventListener('click', async () => {
            const payload = {};
            for (const k of MARGIN_KEYS) {
                const raw = document.getElementById('m-' + k).value.trim();
                if (raw === '' || isNaN(parseInt(raw, 10)) || parseInt(raw, 10) < 0) {
                    showSettingsStatus(`${k} は0以上の整数を入力してください`, 'error');
                    return;
                }
                payload[k] = parseInt(raw, 10);
            }
            btnSettingsSave.disabled = true;
            try {
                const res = await fetch(BASE_URL + '/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (data.error) {
                    showSettingsStatus('エラー: ' + data.error, 'error');
                } else {
                    showSettingsStatus('保存しました', 'success');
                    setTimeout(closeSettings, 1000);
                }
            } catch (e) {
                showSettingsStatus('通信エラー: ' + e.message, 'error');
            } finally {
                btnSettingsSave.disabled = false;
            }
        });
    </script>
</body>
</html>
