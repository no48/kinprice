<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金価格アップロードツール</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>金価格アップロードツール</h1>

        <button id="btn-fetch" class="btn btn-fetch">価格を取得する</button>

        <form id="price-form" class="price-form hidden">
            <div class="form-group">
                <label for="price-date">取得日時</label>
                <input type="text" id="price-date" name="date" readonly>
            </div>

            <!-- 金スクラップ -->
            <div id="gold-scrap-section" class="scrap-section hidden">
                <h2 class="scrap-heading">金買取価格</h2>
                <div class="scrap-grid" id="gold-scrap-grid"></div>
            </div>

            <!-- Ptスクラップ -->
            <div id="pt-scrap-section" class="scrap-section hidden">
                <h2 class="scrap-heading">Ptスクラップ買取価格</h2>
                <div class="scrap-grid" id="pt-scrap-grid"></div>
            </div>

            <button type="button" id="btn-upload" class="btn btn-upload">WordPressにアップロード</button>
        </form>

        <div id="status" class="status hidden"></div>

        <div id="source-link-wrap" class="source-link-wrap hidden">
            取得元: <a id="source-link" href="#" target="_blank" rel="noopener">#</a>
        </div>

        <div id="gbp-section" class="gbp-section hidden">
            <h2>GBP投稿用テキスト</h2>
            <div id="gbp-text" class="gbp-text"></div>
            <button id="btn-gbp" class="btn btn-gbp">コピーしてGBPを開く</button>
        </div>
    </div>

    <script>
        const BASE_URL = "{{ url_for('main.index') }}".replace(/\/$/, '');

        const btnFetch = document.getElementById('btn-fetch');
        const btnUpload = document.getElementById('btn-upload');
        const priceForm = document.getElementById('price-form');
        const statusEl = document.getElementById('status');
        const priceDateEl = document.getElementById('price-date');
        const gbpSection = document.getElementById('gbp-section');
        const gbpTextEl = document.getElementById('gbp-text');
        const btnGbp = document.getElementById('btn-gbp');
        const sourceLinkWrap = document.getElementById('source-link-wrap');
        const sourceLinkEl = document.getElementById('source-link');

        const GOLD_SCRAP_KEYS = ['K24', 'K18', 'K14'];
        const PT_SCRAP_KEYS = ['Pt1000', 'Pt900', 'Pt850'];
        const SCRAP_LABELS = {
            'K24': 'K24（インゴット）',
            'K18': 'K18',
            'K14': 'K14',
            'Pt1000': 'Pt1000（インゴット）',
            'Pt900': 'Pt900',
            'Pt850': 'Pt850',
        };

        let gbpText = '';
        let gbpSearchUrl = '';

        function showStatus(message, type) {
            statusEl.textContent = message;
            statusEl.className = 'status ' + type;
            statusEl.classList.remove('hidden');
        }

        function hideStatus() {
            statusEl.classList.add('hidden');
        }

        function renderScrapGrid(gridEl, sectionEl, data, allowedKeys) {
            gridEl.innerHTML = '';
            const visibleKeys = allowedKeys.filter(k => data[k] !== undefined);
            if (visibleKeys.length === 0) {
                sectionEl.classList.add('hidden');
                return;
            }
            sectionEl.classList.remove('hidden');
            visibleKeys.forEach(key => {
                const row = document.createElement('div');
                row.className = 'scrap-row';
                row.innerHTML =
                    '<span class="scrap-label">' + SCRAP_LABELS[key] + '</span>' +
                    '<span class="scrap-input-wrap">' +
                        '<input type="text" class="scrap-input" data-key="' + key + '" value="' + data[key] + '" data-ref="' + data[key] + '">' +
                        '<span class="unit">円</span>' +
                    '</span>';
                gridEl.appendChild(row);
            });
        }

        function collectScrapValues(gridEl) {
            const result = {};
            gridEl.querySelectorAll('.scrap-input').forEach(input => {
                const val = input.value.trim();
                if (val) result[input.dataset.key] = val;
            });
            return result;
        }

        function findEmptyPriceLabels() {
            const empty = [];
            document.querySelectorAll('#gold-scrap-grid .scrap-input, #pt-scrap-grid .scrap-input').forEach(input => {
                if (!input.value.trim()) {
                    empty.push(SCRAP_LABELS[input.dataset.key] || input.dataset.key);
                }
            });
            return empty;
        }

        function parsePriceNumber(s) {
            if (!s) return NaN;
            return parseFloat(String(s).replace(/,/g, ''));
        }

        function findBelowReferenceLabels() {
            const below = [];
            document.querySelectorAll('#gold-scrap-grid .scrap-input, #pt-scrap-grid .scrap-input').forEach(input => {
                const entered = parsePriceNumber(input.value);
                const ref = parsePriceNumber(input.dataset.ref);
                if (!isNaN(entered) && !isNaN(ref) && entered < ref) {
                    const label = SCRAP_LABELS[input.dataset.key] || input.dataset.key;
                    below.push(`${label}: ${input.value.trim()} < 参考 ${input.dataset.ref}`);
                }
            });
            return below;
        }

        btnFetch.addEventListener('click', async () => {
            btnFetch.disabled = true;
            btnFetch.textContent = '取得中...';
            hideStatus();

            try {
                const res = await fetch(BASE_URL + '/fetch', { method: 'POST' });
                const data = await res.json();

                if (data.error) {
                    showStatus('エラー: ' + data.error, 'error');
                } else {
                    priceDateEl.value = data.date || '';
                    priceForm.classList.remove('hidden');

                    if (data.source_url) {
                        sourceLinkEl.href = data.source_url;
                        sourceLinkEl.textContent = data.source_url;
                        sourceLinkWrap.classList.remove('hidden');
                    }

                    renderScrapGrid(
                        document.getElementById('gold-scrap-grid'),
                        document.getElementById('gold-scrap-section'),
                        data.gold_scrap || {},
                        GOLD_SCRAP_KEYS
                    );
                    renderScrapGrid(
                        document.getElementById('pt-scrap-grid'),
                        document.getElementById('pt-scrap-section'),
                        data.pt_scrap || {},
                        PT_SCRAP_KEYS
                    );
                }
            } catch (e) {
                showStatus('通信エラーが発生しました: ' + e.message, 'error');
            } finally {
                btnFetch.disabled = false;
                btnFetch.textContent = '価格を取得する';
            }
        });

        btnUpload.addEventListener('click', async () => {
            const emptyLabels = findEmptyPriceLabels();
            if (emptyLabels.length > 0) {
                alert('以下の価格が未入力です。プレースホルダの値を確認して入力してください:\n\n・' + emptyLabels.join('\n・'));
                return;
            }

            const belowLabels = findBelowReferenceLabels();
            if (belowLabels.length > 0) {
                const ok = confirm('以下の価格が参考値（プレースホルダ）より低いです。続行しますか？\n\n・' + belowLabels.join('\n・'));
                if (!ok) return;
            }

            btnUpload.disabled = true;
            btnUpload.textContent = 'アップロード中...';
            statusEl.classList.add('hidden');
            gbpSection.classList.add('hidden');

            const payload = {
                date: priceDateEl.value,
                post_to_wp: true,
                gold_scrap: collectScrapValues(document.getElementById('gold-scrap-grid')),
                pt_scrap: collectScrapValues(document.getElementById('pt-scrap-grid')),
            };

            try {
                const res = await fetch(BASE_URL + '/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();

                if (data.error) {
                    showStatus('エラー: ' + data.error, 'error');
                } else {
                    const messages = [];
                    if (data.wordpress) {
                        if (data.wordpress.success) {
                            messages.push('WordPress: ' + (data.wordpress.message || '投稿成功'));
                        } else {
                            messages.push('WordPress エラー: ' + (data.wordpress.error || '不明なエラー'));
                        }
                    }
                    const wpSuccess = data.wordpress && data.wordpress.success;
                    showStatus(messages.join('\n'), wpSuccess ? 'success' : 'error');

                    if (data.gbp_text) {
                        gbpText = data.gbp_text;
                        gbpSearchUrl = data.gbp_search_url || '';
                        gbpTextEl.textContent = gbpText;
                        gbpSection.classList.remove('hidden');
                    }
                }
            } catch (e) {
                showStatus('通信エラーが発生しました: ' + e.message, 'error');
            } finally {
                btnUpload.disabled = false;
                btnUpload.textContent = 'WordPressにアップロード';
            }
        });

        btnGbp.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(gbpText);
                btnGbp.textContent = 'コピーしました！';
                setTimeout(() => {
                    btnGbp.textContent = 'コピーしてGBPを開く';
                }, 2000);
            } catch (e) {
                btnGbp.textContent = 'コピー失敗...';
                setTimeout(() => {
                    btnGbp.textContent = 'コピーしてGBPを開く';
                }, 2000);
            }
            if (gbpSearchUrl) {
                window.open(gbpSearchUrl, '_blank');
            }
        });
    </script>
</body>
</html>
